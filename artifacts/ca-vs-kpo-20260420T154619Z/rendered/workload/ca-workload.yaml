apiVersion: v1
kind: Namespace
metadata:
  name: benchmark-ca
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-load
  namespace: benchmark-ca
  labels:
    app.kubernetes.io/name: benchmark-load
    benchmark.oracle.com/autoscaler: "ca"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: benchmark-load
  template:
    metadata:
      labels:
        app.kubernetes.io/name: benchmark-load
        benchmark.oracle.com/autoscaler: "ca"
    spec:
      nodeSelector:
        benchmark.oracle.com/autoscaler: "ca"
        benchmark.oracle.com/role: "benchmark"
      containers:
      - name: benchmark-load
        image: registry.k8s.io/pause:3.9
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
